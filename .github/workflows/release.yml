name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + server bundle
        run: npm run build

      - name: Build and notarize macOS ${{ matrix.arch }}
        run: npx electron-builder --mac --${{ matrix.arch }} --config.directories.output=release-mac
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: release-mac/otto-tracker-mac-${{ matrix.arch }}.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web + server bundle
        run: npm run build

      - name: Build Windows x64 installer
        run: npx electron-builder --win --x64 --config.directories.output=release-win

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: release-win/otto-tracker-win-x64.exe
          if-no-files-found: error

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mac-arm64/otto-tracker-mac-arm64.dmg
            dist/mac-x64/otto-tracker-mac-x64.dmg
            dist/win-x64/otto-tracker-win-x64.exe
          generate_release_notes: true
