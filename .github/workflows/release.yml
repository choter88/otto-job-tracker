name: Release

on:
  push:
    tags:
      - "v*"

# Ensure only one release runs at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── macOS (both architectures in one job) ───────────────────
  mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          CERT_PATH=$RUNNER_TEMP/cert.p12

          echo "$APPLE_CERT_BASE64" | base64 --decode -o $CERT_PATH

          security create-keychain -p "temp-password" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "temp-password" $KEYCHAIN_PATH
          security import $CERT_PATH -k $KEYCHAIN_PATH \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "temp-password" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # The web/server bundle must be built before electron-builder packages it.
      - name: Build web + server bundle
        run: npm run build

      # electron-updater needs a GitHub PAT at runtime to fetch releases from
      # the private repo.  This file is bundled into the app and gitignored.
      - name: Generate auto-update token
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "// Auto-generated at build time. DO NOT commit." > desktop/lib/update-token.js
          echo "export const UPDATE_TOKEN = \"${GH_TOKEN}\";" >> desktop/lib/update-token.js

      # Build BOTH architectures in a single invocation so electron-builder
      # produces a single latest-mac.yml that references both arm64 and x64
      # ZIPs.  Splitting into separate jobs would cause the second to overwrite
      # the first's manifest, breaking auto-update for one architecture.
      - name: Build macOS (arm64 + x64)
        timeout-minutes: 30
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64 --x64 --publish never

      - name: Upload Mac artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Uploading Mac artifacts for $TAG..."

          # Collect all publishable Mac artifacts
          FILES=()
          for f in release/*.dmg release/*.zip release/latest-mac.yml release/*.blockmap; do
            [ -f "$f" ] && FILES+=("$f")
          done

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No Mac artifacts found in release/"
            exit 1
          fi

          echo "Found ${#FILES[@]} file(s): ${FILES[*]}"

          # Create the release as a DRAFT so it's invisible to the auto-updater
          # and portal until manually promoted via:
          #   gh release edit "$TAG" --draft=false --latest
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" "${FILES[@]}" --title "$TAG" --generate-notes --draft
          fi

  # ─── Windows x64 ────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build web + server bundle
        run: npm run build

      - name: Generate auto-update token
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: pwsh
        run: |
          $content = "// Auto-generated at build time. DO NOT commit.`nexport const UPDATE_TOKEN = `"$env:GH_TOKEN`";`n"
          Set-Content -Path "desktop/lib/update-token.js" -Value $content -NoNewline

      # Build the unsigned installer. We don't --publish here because we need
      # to sign first. electron-builder outputs to the "release" directory
      # (configured in package.json build.directories.output).
      - name: Build Windows app (unsigned)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --x64 --publish never
        shell: pwsh

      - name: Install Azure Trusted Signing dlib
        shell: pwsh
        run: |
          # Try both package names (Microsoft rebranded the package)
          $nugetDir = "$env:RUNNER_TEMP\TrustedSigning"

          $installed = $false
          foreach ($pkg in @("Microsoft.Trusted.Signing.Client", "Microsoft.ArtifactSigning.Client")) {
            Write-Host "Trying: nuget install $pkg ..."
            $result = nuget install $pkg -OutputDirectory $nugetDir -ExcludeVersion -NonInteractive 2>&1
            Write-Host $result
            $dlib = Get-ChildItem -Path $nugetDir -Recurse -Filter "Azure.CodeSigning.Dlib.dll" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*x64*" } |
              Select-Object -First 1
            if ($dlib) {
              Write-Host "Found dlib at: $($dlib.FullName)"
              $installed = $true
              break
            }
          }

          if (-not $installed) {
            Write-Error "Failed to install Trusted Signing client via NuGet"
            exit 1
          }

      - name: Sign the installer
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No .exe found in release/ directory"
            exit 1
          }
          Write-Host "Signing $($installer.FullName)..."

          # Find the dlib installed in the previous step
          $dlib = Get-ChildItem -Path "$env:RUNNER_TEMP\TrustedSigning" `
            -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1

          # Find signtool.exe from the Windows SDK
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) { Write-Error "signtool.exe not found"; exit 1 }
          if (-not $dlib) { Write-Error "Azure.CodeSigning.Dlib.dll not found"; exit 1 }

          Write-Host "Using signtool: $($signtool.FullName)"
          Write-Host "Using dlib: $($dlib.FullName)"

          & $signtool.FullName sign `
            /v `
            /fd SHA256 `
            /tr "http://timestamp.acs.microsoft.com" `
            /td SHA256 `
            /dlib $dlib.FullName `
            /dmdf ".github/artifact-signing-metadata.json" `
            $installer.FullName

      # After signing, the .exe hash no longer matches latest.yml (which was
      # generated by electron-builder before signing).  Recompute the sha512
      # and patch the manifest so auto-update checksums pass.
      - name: Rehash latest.yml after signing
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "release" -Filter "*.exe" | Select-Object -First 1
          $yml = "release/latest.yml"

          if (-not $exe -or -not (Test-Path $yml)) {
            Write-Host "Skipping rehash — exe or latest.yml not found"
            exit 0
          }

          Write-Host "Recomputing SHA-512 for $($exe.Name)..."
          $hashBytes = (Get-FileHash -Path $exe.FullName -Algorithm SHA512).Hash
          # Get-FileHash returns hex — convert to base64 to match electron-updater format
          $hexBytes = [byte[]] -split ($hashBytes -replace '..', '0x$& ')
          $newHash = [Convert]::ToBase64String($hexBytes)
          $newSize = (Get-Item $exe.FullName).Length

          $content = Get-Content $yml -Raw
          # Extract old hash from "sha512: <hash>" line
          if ($content -match '(?m)^sha512:\s*(.+)$') {
            $oldHash = $Matches[1].Trim()
            if ($oldHash -ne $newHash) {
              $content = $content.Replace($oldHash, $newHash)
              # Update all size fields
              $content = $content -replace '(?m)^(\s*size:\s*)\d+$', "`${1}$newSize"
              Set-Content -Path $yml -Value $content -NoNewline
              Write-Host "  Old hash: $($oldHash.Substring(0,24))..."
              Write-Host "  New hash: $($newHash.Substring(0,24))..."
              Write-Host "  New size: $newSize bytes"
              Write-Host "  latest.yml updated to match signed installer"
            } else {
              Write-Host "  Hash unchanged — installer was not modified by signing."
            }
          }

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = Get-ChildItem -Path "release" -Filter "*.exe" | Select-Object -First 1
          $yml = "release/latest.yml"

          $files = @()
          if ($exe) { $files += $exe.FullName }
          if (Test-Path $yml) { $files += $yml }

          if ($files.Count -eq 0) {
            Write-Error "No artifacts to upload"
            exit 1
          }

          Write-Host "Uploading $($files.Count) file(s) to release $tag..."

          # The Mac job (which runs first via needs: mac) creates the release
          # with --publish always. Upload Windows artifacts to that release.
          # If the release somehow doesn't exist, create it.
          $ErrorActionPreference = "Continue"
          $viewResult = gh release view $tag 2>&1
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @files --clobber
          } else {
            gh release create $tag @files --title $tag --generate-notes --draft
          }
