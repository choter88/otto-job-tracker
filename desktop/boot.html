<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting Otto Tracker</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: grid;
        place-items: center;
        height: 100vh;
      }
      .card {
        text-align: center;
        padding: 28px 32px;
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .subtitle {
        font-size: 14px;
        color: #94a3b8;
      }
      .spinner {
        margin: 16px auto 0;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(148, 163, 184, 0.3);
        border-top-color: #38bdf8;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Starting Otto Tracker</div>
      <div class="subtitle">Getting the Host ready…</div>
      <div class="spinner" aria-hidden="true"></div>
    </div>
  </body>
</html>
